name: Daily Data Update

on:
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC = 2 AM MST
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch full 2025 year from ArcGIS
        env:
          ARCGIS_ENDPOINT: ${{ secrets.ARCGIS_ENDPOINT }}
        run: |
          node scripts/fetch-arcgis.js --year 2025
          TODAY=$(date +%Y-%m-%d)
          # Rename to the format expected by build_site_data.js
          mv data/fetched_${TODAY}.geojson data/Tucson_Police_Incidents_-_2025_-_Open_Data.geojson
          echo "Features fetched:"
          python3 -c "import json; d=json.load(open('data/Tucson_Police_Incidents_-_2025_-_Open_Data.geojson')); print(len(d['features']))"

      - name: Rebuild 2025 data chunks
        run: node scripts/build_site_data.js --targetMB 5 --level 9

      - name: Merge manifest with existing historical chunks (2021-2024)
        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          # Download existing manifest from R2 to preserve 2021-2024 chunk entries
          curl -sf "${R2_PUBLIC_URL}/manifest.json" -o /tmp/existing-manifest.json \
            || echo '{"chunks":[]}' > /tmp/existing-manifest.json

          node -e "
            const fs = require('fs');
            const existing = JSON.parse(fs.readFileSync('/tmp/existing-manifest.json', 'utf-8'));
            const rebuilt = JSON.parse(fs.readFileSync('public/data/manifest.json', 'utf-8'));
            // Keep historical (non-2025) chunks from R2, add fresh 2025 chunks
            const historical = (existing.chunks || []).filter(c => !String(c).includes('2025'));
            const fresh2025 = (rebuilt.chunks || []);
            const merged = {
              ...rebuilt,
              chunks: [...historical, ...fresh2025],
              generatedAt: new Date().toISOString(),
            };
            fs.writeFileSync('public/data/manifest.json', JSON.stringify(merged));
            console.log('Manifest: ' + merged.chunks.length + ' total chunks (' + historical.length + ' historical + ' + fresh2025.length + ' 2025)');
          "

      - name: Upload updated chunks to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/upload-r2.js

      - name: Report success
        run: echo "Data update complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
