name: Daily Data Update

on:
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC = 2 AM MST
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest incidents from ArcGIS
        env:
          ARCGIS_ENDPOINT: ${{ secrets.ARCGIS_ENDPOINT }}
        run: node scripts/fetch-arcgis.js

      - name: Rebuild data chunks from fetched data
        run: node scripts/build_site_data.js --targetMB 5 --level 9

      - name: Upload new chunks to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/upload-r2.js

      - name: Trigger Vercel redeploy
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "$VERCEL_DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail --silent --show-error

      - name: Report success
        run: echo "Data update complete at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
